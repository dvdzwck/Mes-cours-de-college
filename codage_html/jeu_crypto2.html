<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #1a2a3a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        #coffre-container {
            width: 300px; height: 300px;
            background-image: url('coffre_ferme.png'); /* REMPLACEZ PAR VOTRE IMAGE */
            background-size: contain; background-repeat: no-repeat;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            transition: all 0.3s;
        }

        .shake { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        .cadrans { margin-bottom: 20px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; }
        input { width: 40px; height: 40px; font-size: 20px; text-align: center; }
    </style>
</head>
<body>

<div id="coffre-container">
    <div class="cadrans">
        <input type="number" id="c1" min="0" max="9">
        <input type="number" id="c2" min="0" max="9">
        <input type="number" id="c3" min="0" max="9">
        <button onclick="verifier()">OK</button>
    </div>
</div>

<script>
    function verifier() {
        const container = document.getElementById('coffre-container');
        // Combinaison : 6, 8, 1 (basé sur vos énigmes)
        if(document.getElementById('c1').value == '6' && 
           document.getElementById('c2').value == '8' && 
           document.getElementById('c3').value == '1') {
            container.style.backgroundImage = "url('coffre_ouvert.png')"; // REMPLACEZ PAR VOTRE IMAGE
            alert("Bravo, le code est bon !");
        } else {
            container.classList.add('shake');
            setTimeout(() => container.classList.remove('shake'), 500);
        }
    }
</script>
</body>
</html>
